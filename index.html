<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monarch Match</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f5c842;
    --gold-dark: #c89a10;
    --royal-blue: #3a6fd8;
    --deep: #1a1060;
    --bg: #1a0a4c;
    --panel: rgba(255,255,255,0.08);
    --radius: 18px;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: #1a0a4c;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 18px 10px 30px;
    overflow-x: hidden;
    color: #fff;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.4rem;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 6px;
    position: relative; z-index: 1;
  }

  .subtitle {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 14px;
    z-index: 1;
    position: relative;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  #hud {
    display: flex;
    gap: 20px;
    margin-bottom: 14px;
    z-index: 1;
    position: relative;
  }

  .hud-box {
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    padding: 8px 22px;
    text-align: center;
  }

  .hud-label {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 2px;
  }

  .hud-val {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--gold);
  }

  #board-wrap {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.18);
    border-radius: 22px;
    padding: 10px;
    box-shadow: 0 8px 48px #0008;
    overflow: hidden;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(7, 62px);
    grid-template-rows: repeat(8, 62px);
    gap: 4px;
    position: relative;
  }

  .cell {
    width: 62px; height: 62px;
    border-radius: 13px;
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: visible;
  }

  .tile {
    width: 56px; height: 56px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    position: absolute;
    top: 3px; left: 3px;
    user-select: none;
    cursor: grab;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), filter 0.15s;
    will-change: transform;
    z-index: 2;
  }

  .tile:active { cursor: grabbing; transform: scale(0.93); }
  .tile.selected {
    transform: scale(1.13);
    filter: brightness(1.2);
    z-index: 10;
  }
  .tile.hint { animation: hint-pulse 0.7s ease-in-out infinite alternate; }

  @keyframes hint-pulse {
    from { filter: brightness(1.1); transform: scale(1.05); }
    to   { filter: brightness(1.4); transform: scale(1.1); }
  }

  .tile.falling {
    animation: fall-in 0.32s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes fall-in {
    from { transform: translateY(-70px) scale(0.8); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }

  .tile.matched {
    animation: pop-out 0.25s ease-in forwards;
  }
  @keyframes pop-out {
    0%   { transform: scale(1); opacity: 1; }
    50%  { transform: scale(1.3); opacity: 0.6; }
    100% { transform: scale(0); opacity: 0; }
  }

  .tile.swap-right { animation: swap-r-fwd 0.22s ease-in-out forwards; }
  .tile.swap-left  { animation: swap-l-fwd 0.22s ease-in-out forwards; }
  .tile.swap-down  { animation: swap-d-fwd 0.22s ease-in-out forwards; }
  .tile.swap-up    { animation: swap-u-fwd 0.22s ease-in-out forwards; }

  .tile.swap-right-fail { animation: swap-r-fail 0.32s ease-in-out forwards; }
  .tile.swap-left-fail  { animation: swap-l-fail 0.32s ease-in-out forwards; }
  .tile.swap-down-fail  { animation: swap-d-fail 0.32s ease-in-out forwards; }
  .tile.swap-up-fail    { animation: swap-u-fail 0.32s ease-in-out forwards; }

  @keyframes swap-r-fwd { 0%{transform:translateX(0)} 100%{transform:translateX(66px)} }
  @keyframes swap-l-fwd { 0%{transform:translateX(0)} 100%{transform:translateX(-66px)} }
  @keyframes swap-d-fwd { 0%{transform:translateY(0)} 100%{transform:translateY(66px)} }
  @keyframes swap-u-fwd { 0%{transform:translateY(0)} 100%{transform:translateY(-66px)} }

  @keyframes swap-r-fail { 0%{transform:translateX(0)} 40%{transform:translateX(44px)} 100%{transform:translateX(0)} }
  @keyframes swap-l-fail { 0%{transform:translateX(0)} 40%{transform:translateX(-44px)} 100%{transform:translateX(0)} }
  @keyframes swap-d-fail { 0%{transform:translateY(0)} 40%{transform:translateY(44px)} 100%{transform:translateY(0)} }
  @keyframes swap-u-fail { 0%{transform:translateY(0)} 40%{transform:translateY(-44px)} 100%{transform:translateY(0)} }

  .tile-bomb { position: relative; }
  .tile-bomb::after {
    content: '💣';
    position: absolute; top: -6px; right: -6px;
    font-size: 18px; line-height: 1;
  }
  .tile-firework-h::after { content: '↔️'; position:absolute; top:-6px; right:-6px; font-size:14px; }
  .tile-firework-v::after { content: '↕️'; position:absolute; top:-6px; right:-6px; font-size:14px; }
  .tile-disco::after {
    content: '🪩';
    position: absolute; top:-8px; right:-8px; font-size:22px;
    animation: disco-spin 1s linear infinite;
  }
  @keyframes disco-spin { to { transform: rotate(360deg); } }

  #moves-box {
    transition: background 0.3s, border-color 0.3s;
  }
  #moves-box.low {
    background: rgba(255, 60, 60, 0.25);
    border-color: rgba(255, 80, 80, 0.6);
    animation: moves-pulse 0.8s ease-in-out infinite alternate;
  }
  @keyframes moves-pulse {
    from { box-shadow: 0 0 0px #f00; }
    to   { box-shadow: 0 0 14px 4px rgba(255,60,60,0.5); }
  }
  #moves-box.low #moves-val { color: #ff6060; }

  #moves-box.bonus {
    animation: moves-bonus-flash 0.55s ease-out forwards;
  }
  @keyframes moves-bonus-flash {
    0%   { background: rgba(80, 255, 160, 0.35); border-color: rgba(80,255,160,0.8); box-shadow: 0 0 20px 6px rgba(80,255,160,0.45); }
    60%  { background: rgba(80, 255, 160, 0.15); border-color: rgba(80,255,160,0.4); }
    100% { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); box-shadow: none; }
  }

  .bonus-moves-pop {
    position: fixed;
    font-family: 'Fredoka One', cursive;
    font-size: 1.25rem;
    color: #50ffa0;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    pointer-events: none;
    z-index: 300;
    white-space: nowrap;
    animation: bonus-float 1.3s ease-out forwards;
  }
  @keyframes bonus-float {
    0%   { opacity: 0; transform: translateY(0) scale(0.7); }
    20%  { opacity: 1; transform: translateY(-10px) scale(1.1); }
    80%  { opacity: 1; transform: translateY(-44px) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(0.9); }
  }

  #gameover-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10, 5, 40, 0.85);
    backdrop-filter: blur(6px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  #gameover-overlay.show {
    display: flex;
    animation: go-fade-in 0.4s ease-out;
  }
  @keyframes go-fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  #gameover-card {
    background: linear-gradient(160deg, #1e0e6a, #2a1280);
    border: 2px solid rgba(245, 200, 66, 0.5);
    border-radius: 28px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 20px 80px rgba(0,0,0,0.7), 0 0 40px rgba(245,200,66,0.15);
    max-width: 380px;
    width: 90%;
    animation: go-card-in 0.45s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes go-card-in {
    from { transform: scale(0.7) translateY(40px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  #gameover-crown {
    font-size: 3.5rem;
    margin-bottom: 8px;
    filter: grayscale(0.4);
    animation: crown-drop 0.6s cubic-bezier(.34,1.56,.64,1) 0.2s both;
  }
  @keyframes crown-drop {
    from { transform: translateY(-30px) scale(0.5); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }

  #gameover-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--gold);
    margin-bottom: 28px;
    letter-spacing: 1px;
  }

  #gameover-scores {
    background: rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 18px 24px;
    margin-bottom: 16px;
  }

  .go-score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
  }
  .go-score-row + .go-score-row {
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .go-score-label {
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }
  .go-score-val {
    font-family: 'Fredoka One', cursive;
    font-size: 1.7rem;
    color: var(--gold);
  }

  #go-new-best {
    color: #ffe066;
    font-weight: 800;
    font-size: 0.95rem;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
    animation: sparkle 0.6s ease-in-out infinite alternate;
  }
  #go-new-best.hidden { display: none; }
  @keyframes sparkle {
    from { opacity: 0.7; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1.03); }
  }

  #replay-btn {
    margin-top: 20px;
    background: linear-gradient(135deg, #f5c842, #c89010);
    color: #1a0a4c;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    letter-spacing: 1.5px;
    border: none;
    border-radius: 50px;
    padding: 14px 44px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(245,200,66,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #replay-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 6px 28px rgba(245,200,66,0.6);
  }
  #replay-btn:active { 
    transform: scale(0.97);
  }

  .score-pop {
    position: absolute;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: #ffe066;
    text-shadow: 0 2px 8px #0008;
    pointer-events: none;
    z-index: 100;
    animation: score-float 1s ease-out forwards;
  }
  @keyframes score-float {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
  }

  #combo-flash {
    position: fixed; top: 30%; left: 50%; transform: translateX(-50%);
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    color: var(--gold);
    pointer-events: none;
    z-index: 200;
    opacity: 0;
    transition: none;
  }
  #combo-flash.show {
    animation: combo-anim 1.1s ease-out forwards;
  }
  @keyframes combo-anim {
    0%   { opacity: 0; transform: translateX(-50%) scale(0.5); }
    15%  { opacity: 1; transform: translateX(-50%) scale(1.2); }
    70%  { opacity: 1; transform: translateX(-50%) scale(1); }
    100% { opacity: 0; transform: translateX(-50%) scale(0.9) translateY(-20px); }
  }

  .explosion {
    position: absolute;
    border-radius: 50%;
    border: 3px solid #ff8800;
    pointer-events: none;
    z-index: 50;
    animation: explode 0.45s ease-out forwards;
  }
  @keyframes explode {
    0%   { width:10px;height:10px;opacity:1;transform:translate(-50%,-50%) scale(1);}
    100% { width:120px;height:120px;opacity:0;transform:translate(-50%,-50%) scale(1);}
  }

  .firework-line {
    position: fixed;
    pointer-events: none;
    z-index: 50;
    background: linear-gradient(90deg, transparent, #ffdd44, transparent);
    height: 4px;
    animation: fw-flash 0.4s ease-out forwards;
  }
  .firework-line.vertical {
    background: linear-gradient(180deg, transparent, #ffdd44, transparent);
    width: 4px;
    height: 0;
    animation: fw-flash-v 0.4s ease-out forwards;
  }
  @keyframes fw-flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes fw-flash-v {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<h1>Monarch Match</h1>
<p class="subtitle"></p>

<div id="hud">
  <div class="hud-box">
    <div class="hud-label">Score</div>
    <div class="hud-val" id="score-val">0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">Best</div>
    <div class="hud-val" id="best-val">0</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">Combo</div>
    <div class="hud-val" id="combo-val">x1</div>
  </div>
  <div class="hud-box" id="moves-box">
    <div class="hud-label">Moves</div>
    <div class="hud-val" id="moves-val">30</div>
  </div>
</div>

<div id="gameover-overlay">
  <div id="gameover-card">
    <div id="gameover-crown">👑</div>
    <div id="gameover-title">Out of Moves!</div>
    <div id="gameover-scores">
      <div class="go-score-row">
        <span class="go-score-label">Your Score</span>
        <span class="go-score-val" id="go-score">0</span>
      </div>
      <div class="go-score-row" id="go-best-row">
        <span class="go-score-label">Best</span>
        <span class="go-score-val" id="go-best">0</span>
      </div>
    </div>
    <div id="go-new-best" class="hidden">New Best Score!</div>
    <button id="replay-btn" onclick="startNewGame()">Play Again</button>
  </div>
</div>

<div id="board-wrap">
  <div id="board"></div>
</div>

<div id="combo-flash"></div>

<script>
const COLS = 7, ROWS = 8;
const COLORS = ['red','green','blue','yellow','purple'];
const TILE_VISUALS = {
  red:    { bg:'linear-gradient(145deg,#e84040,#a01010)', shadow:'#e8404088' },
  green:  { bg:'linear-gradient(145deg,#4fc840,#1a8010)', shadow:'#4fc84088' },
  blue:   { bg:'linear-gradient(145deg,#4070e8,#1030a0)', shadow:'#4070e888' },
  yellow: { bg:'linear-gradient(145deg,#f5c842,#c89010)', shadow:'#f5c84288' },
  purple: { bg:'linear-gradient(145deg,#c040e8,#7010a0)', shadow:'#c040e888' },
};
const ICONS = {
  red: `<svg viewBox="0 0 40 40" width="36" height="36"><rect x="4" y="4" width="32" height="32" rx="7" fill="#e84040"/><rect x="4" y="4" width="32" height="16" rx="7" fill="#ff6a6a" opacity="0.5"/><rect x="8" y="8" width="10" height="5" rx="2.5" fill="white" opacity="0.25"/></svg>`,
  green: `<svg viewBox="0 0 40 40" width="36" height="36"><path d="M20 5 C10 5,3 14,5 26 C7 34,15 38,20 38 C25 38,33 34,35 26 C37 14,30 5,20 5Z" fill="#50c840"/><path d="M20 5 C14 5,8 11,8 18 C8 22,11 26,15 28" fill="none" stroke="#80e860" stroke-width="2" opacity="0.5"/></svg>`,
  blue: `<svg viewBox="0 0 40 40" width="36" height="36"><path d="M20 3 L5 12 L5 28 L20 37 L35 28 L35 12Z" fill="#3a6fd8"/><path d="M20 3 L5 12 L5 20 L20 20Z" fill="#6a9ff8" opacity="0.4"/><circle cx="20" cy="20" r="7" fill="#1a3fa8"/><circle cx="17" cy="16" r="2.5" fill="white" opacity="0.3"/></svg>`,
  yellow: `<svg viewBox="0 0 40 40" width="36" height="36"><path d="M8 18 L4 35 L20 27 L36 35 L32 18 L20 8Z" fill="#f5c842"/><path d="M8 18 L20 8 L32 18 L28 18 L20 12 L12 18Z" fill="#ffe880" opacity="0.6"/><circle cx="20" cy="22" r="4" fill="#c89010" opacity="0.5"/></svg>`,
  purple: `<svg viewBox="0 0 40 40" width="36" height="36"><polygon points="20,3 26,14 38,16 29,25 31,37 20,31 9,37 11,25 2,16 14,14" fill="#c040e8"/><polygon points="20,3 26,14 20,14" fill="#e060ff" opacity="0.5"/><circle cx="20" cy="20" r="5" fill="#8010a8" opacity="0.5"/><circle cx="17" cy="16" r="2" fill="white" opacity="0.3"/></svg>`,
};
const SPECIAL = { NONE:'none', BOMB:'bomb', FIREWORK_H:'firework_h', FIREWORK_V:'firework_v', DISCO:'disco' };

let board = [];
let selected = null;
let score = 0, best = 0, combo = 1;
let busy = false;
let hintTimer = null;
const MAX_MOVES = 30;
let movesLeft = MAX_MOVES;
let gameOver = false;

function randColor() { return COLORS[Math.floor(Math.random()*COLORS.length)]; }
function createTile(color, special=SPECIAL.NONE) { return { color, special }; }

function initBoard() {
  board = [];
  for (let r=0;r<ROWS;r++) {
    board[r] = [];
    for (let c=0;c<COLS;c++) {
      let color;
      do { color = randColor(); }
      while (
        (c>=2 && board[r][c-1]?.color===color && board[r][c-2]?.color===color) ||
        (r>=2 && board[r-1]?.[c]?.color===color && board[r-2]?.[c]?.color===color)
      );
      board[r][c] = createTile(color);
    }
  }
}

const boardEl = document.getElementById('board');

function renderBoard(falling=[]) {
  boardEl.innerHTML = '';
  for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS;c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r; cell.dataset.c = c;
      const t = board[r][c];
      if (t) {
        const tile = makeTileEl(t, r, c, falling.some(f=>f[0]===r&&f[1]===c));
        cell.appendChild(tile);
      }
      boardEl.appendChild(cell);
    }
  }
  addBoardListeners();
}

function makeTileEl(t, r, c, isFalling=false) {
  const div = document.createElement('div');
  div.className = 'tile' + (isFalling?' falling':'');
  div.dataset.r = r; div.dataset.c = c;

  if (t.special === SPECIAL.DISCO) {
    div.style.background = 'linear-gradient(145deg,#fff,#c0c0ff,#ffd700,#ff69b4,#00ffcc)';
    div.style.boxShadow = '0 0 18px 4px rgba(255,255,255,0.5)';
    div.innerHTML = `<span style="font-size:30px">🪩</span>`;
    div.classList.add('tile-disco');
  } else {
    const v = TILE_VISUALS[t.color];
    div.style.background = v.bg;
    div.style.boxShadow = `0 4px 12px ${v.shadow}, inset 0 1px 0 rgba(255,255,255,0.3)`;
    div.innerHTML = ICONS[t.color];
    if (t.special === SPECIAL.BOMB) div.classList.add('tile-bomb');
    else if (t.special === SPECIAL.FIREWORK_H) div.classList.add('tile-firework-h');
    else if (t.special === SPECIAL.FIREWORK_V) div.classList.add('tile-firework-v');
  }
  return div;
}

function addBoardListeners() {
  boardEl.querySelectorAll('.tile').forEach(el => {
    el.addEventListener('click', onTileClick);
    el.addEventListener('mousedown', onDragStart);
    el.addEventListener('touchstart', onTouchStart, { passive: true });
  });
}

let dragOrigin = null;
let dragMoved = false;
const DRAG_THRESHOLD = 18;

function onDragStart(e) {
  if (busy || gameOver) return;
  const r = parseInt(e.currentTarget.dataset.r);
  const c = parseInt(e.currentTarget.dataset.c);
  dragOrigin = { r, c, startX: e.clientX, startY: e.clientY };
  dragMoved = false;
  window.addEventListener('mousemove', onDragMove);
  window.addEventListener('mouseup', onDragEnd);
}

function onDragMove(e) {
  if (!dragOrigin) return;
  const dx = e.clientX - dragOrigin.startX;
  const dy = e.clientY - dragOrigin.startY;
  if (!dragMoved && (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD)) {
    dragMoved = true;
  }
}

function onDragEnd(e) {
  window.removeEventListener('mousemove', onDragMove);
  window.removeEventListener('mouseup', onDragEnd);
  if (!dragOrigin || !dragMoved) { dragOrigin = null; return; }

  const dx = e.clientX - dragOrigin.startX;
  const dy = e.clientY - dragOrigin.startY;
  const { r, c } = dragOrigin;
  dragOrigin = null;

  let tr = r, tc = c;
  if (Math.abs(dx) >= Math.abs(dy)) {
    tc = dx > 0 ? c + 1 : c - 1;
  } else {
    tr = dy > 0 ? r + 1 : r - 1;
  }

  if (tr < 0 || tr >= ROWS || tc < 0 || tc >= COLS) return;
  if (selected) { clearSelected(); selected = null; }
  attemptSwap(r, c, tr, tc);
}

let touchOrigin = null;

function onTouchStart(e) {
  if (busy || gameOver) return;
  const touch = e.touches[0];
  const r = parseInt(e.currentTarget.dataset.r);
  const c = parseInt(e.currentTarget.dataset.c);
  touchOrigin = { r, c, startX: touch.clientX, startY: touch.clientY };
  window.addEventListener('touchmove', onTouchMove, { passive: true });
  window.addEventListener('touchend', onTouchEnd);
}

function onTouchMove(e) {
}

function onTouchEnd(e) {
  window.removeEventListener('touchmove', onTouchMove);
  window.removeEventListener('touchend', onTouchEnd);
  if (!touchOrigin) return;
  const touch = e.changedTouches[0];
  const dx = touch.clientX - touchOrigin.startX;
  const dy = touch.clientY - touchOrigin.startY;
  const { r, c } = touchOrigin;
  touchOrigin = null;

  if (Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;

  let tr = r, tc = c;
  if (Math.abs(dx) >= Math.abs(dy)) {
    tc = dx > 0 ? c + 1 : c - 1;
  } else {
    tr = dy > 0 ? r + 1 : r - 1;
  }

  if (tr < 0 || tr >= ROWS || tc < 0 || tc >= COLS) return;
  if (selected) { clearSelected(); selected = null; }
  attemptSwap(r, c, tr, tc);
}

function onTileClick(e) {
  if (busy || gameOver) return;
  if (dragMoved) { dragMoved = false; return; }
  const r = parseInt(e.currentTarget.dataset.r);
  const c = parseInt(e.currentTarget.dataset.c);
  if (!selected) {
    selected = [r,c];
    highlightSelected();
    resetHintTimer();
  } else {
    const [sr,sc] = selected;
    clearSelected();
    if (sr===r && sc===c) { selected=null; return; }
    if (isAdjacent(sr,sc,r,c)) {
      selected = null;
      attemptSwap(sr,sc,r,c);
    } else {
      selected = [r,c];
      highlightSelected();
      resetHintTimer();
    }
  }
}

function isAdjacent(r1,c1,r2,c2) {
  return (Math.abs(r1-r2)+Math.abs(c1-c2))===1;
}

function highlightSelected() {
  clearSelected();
  if (!selected) return;
  const [r,c] = selected;
  const tile = getTileEl(r,c);
  if (tile) tile.classList.add('selected');
}

function clearSelected() {
  boardEl.querySelectorAll('.tile.selected').forEach(t=>t.classList.remove('selected'));
  boardEl.querySelectorAll('.tile.hint').forEach(t=>t.classList.remove('hint'));
}

function getTileEl(r,c) {
  return boardEl.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
}

async function attemptSwap(r1,c1,r2,c2) {
  busy = true;
  resetHintTimer();

  const t1 = board[r1][c1], t2 = board[r2][c2];

  if (t1?.special===SPECIAL.DISCO || t2?.special===SPECIAL.DISCO) {
    animateSwapForward(r1,c1,r2,c2);
    await sleep(220);
    doSwap(r1,c1,r2,c2);
    movesLeft--; updateHUD();
    await handleDiscoSwap(r1,c1,r2,c2,t1,t2);
    busy = false;
    if (movesLeft <= 0) { triggerGameOver(); return; }
    return;
  }

  doSwap(r1,c1,r2,c2);
  const matches = findMatches();

  if (matches.length === 0 && t1?.special === SPECIAL.NONE && t2?.special === SPECIAL.NONE) {
    doSwap(r1,c1,r2,c2);
    animateSwapFail(r1,c1,r2,c2);
    await sleep(320);
    renderBoard();
    busy = false;
    combo = 1; updateHUD();
    return;
  }

  if (matches.length === 0 && (t1?.special !== SPECIAL.NONE || t2?.special !== SPECIAL.NONE)) {
    animateSwapForward(r1,c1,r2,c2);
    await sleep(220);
    renderBoard();
    const specialR = t1?.special !== SPECIAL.NONE ? r2 : r1;
    const specialC = t1?.special !== SPECIAL.NONE ? c2 : c1;
    const stype = t1?.special !== SPECIAL.NONE ? t1.special : t2.special;
    const scolor = t1?.special !== SPECIAL.NONE ? t1.color : t2.color;
    board[specialR][specialC] = null;
    movesLeft--; updateHUD();
    await triggerSpecial(specialR, specialC, stype, scolor);
    await dropTiles();
    await sleep(80);
    const nm = findMatches();
    if (nm.length > 0) { showCombo(); await processMatches(nm); }
    else { combo = 1; updateHUD(); }
    busy = false;
    if (movesLeft <= 0) { triggerGameOver(); return; }
    resetHintTimer();
    return;
  }

  doSwap(r1,c1,r2,c2);
  animateSwapForward(r1,c1,r2,c2);
  await sleep(220);
  doSwap(r1,c1,r2,c2);
  movesLeft--; updateHUD();
  await processMatches(matches, r1,c1,r2,c2);
  busy = false;
  if (movesLeft <= 0) { triggerGameOver(); return; }
  resetHintTimer();
}

function doSwap(r1,c1,r2,c2) {
  [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
}

function animateSwapForward(r1,c1,r2,c2) {
  const t1 = getTileEl(r1,c1), t2 = getTileEl(r2,c2);
  if (!t1||!t2) return;
  const dr=r2-r1, dc=c2-c1;
  if (dc===1)  { t1.classList.add('swap-right'); t2.classList.add('swap-left'); }
  if (dc===-1) { t1.classList.add('swap-left');  t2.classList.add('swap-right');}
  if (dr===1)  { t1.classList.add('swap-down');  t2.classList.add('swap-up');   }
  if (dr===-1) { t1.classList.add('swap-up');    t2.classList.add('swap-down'); }
}

function animateSwapFail(r1,c1,r2,c2) {
  const t1 = getTileEl(r1,c1), t2 = getTileEl(r2,c2);
  if (!t1||!t2) return;
  const dr=r2-r1, dc=c2-c1;
  if (dc===1)  { t1.classList.add('swap-right-fail'); t2.classList.add('swap-left-fail'); }
  if (dc===-1) { t1.classList.add('swap-left-fail');  t2.classList.add('swap-right-fail');}
  if (dr===1)  { t1.classList.add('swap-down-fail');  t2.classList.add('swap-up-fail');   }
  if (dr===-1) { t1.classList.add('swap-up-fail');    t2.classList.add('swap-down-fail'); }
}

function findMatches() {
  const matched = new Set();
  for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS-2;c++) {
      const color = board[r][c]?.color;
      if (!color || board[r][c]?.special===SPECIAL.DISCO) continue;
      if (board[r][c+1]?.color===color && board[r][c+2]?.color===color) {
        let len=3;
        while(c+len<COLS && board[r][c+len]?.color===color) len++;
        for(let i=0;i<len;i++) matched.add(`${r},${c+i}`);
      }
    }
  }
  for (let c=0;c<COLS;c++) {
    for (let r=0;r<ROWS-2;r++) {
      const color = board[r][c]?.color;
      if (!color || board[r][c]?.special===SPECIAL.DISCO) continue;
      if (board[r+1][c]?.color===color && board[r+2][c]?.color===color) {
        let len=3;
        while(r+len<ROWS && board[r+len][c]?.color===color) len++;
        for(let i=0;i<len;i++) matched.add(`${r+i},${c}`);
      }
    }
  }
  return [...matched].map(k=>{ const [r,c]=k.split(',').map(Number); return [r,c]; });
}

function groupMatches(matches) {
  const map = new Map();
  matches.forEach(([r,c])=>map.set(`${r},${c}`,[r,c]));
  const visited = new Set();
  const groups = [];
  for (const key of map.keys()) {
    if (visited.has(key)) continue;
    const group = [];
    const stack = [key];
    while(stack.length) {
      const k = stack.pop();
      if (visited.has(k)) continue;
      visited.add(k);
      group.push(map.get(k));
      const [r,c] = map.get(k);
      [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{
        const nk=`${nr},${nc}`;
        if (map.has(nk) && !visited.has(nk)) stack.push(nk);
      });
    }
    groups.push(group);
  }
  return groups;
}

async function processMatches(matches, swapR1=-1, swapC1=-1, swapR2=-1, swapC2=-1) {
  const groups = groupMatches(matches);

  const toSpawn = [];
  const swappedPositions = new Set([`${swapR1},${swapC1}`,`${swapR2},${swapC2}`]);

  for (const group of groups) {
    const n = group.length;
    let special = SPECIAL.NONE;
    if (n >= 7) special = SPECIAL.DISCO;
    else if (n >= 5) special = SPECIAL.BOMB;
    else if (n === 4) special = (Math.random()<0.5) ? SPECIAL.FIREWORK_H : SPECIAL.FIREWORK_V;

    if (special !== SPECIAL.NONE) {
      let spawnPos = null;
      for (const [r,c] of group) {
        if (swappedPositions.has(`${r},${c}`)) { spawnPos=[r,c]; break; }
      }
      if (!spawnPos) {
        const mid = Math.floor(group.length/2);
        spawnPos = group[mid];
      }
      toSpawn.push({ r:spawnPos[0], c:spawnPos[1], special, color: board[spawnPos[0]][spawnPos[1]].color });
    }
  }

  const pts = matches.length * 60 * combo;
  addScore(pts, matches);
  combo++;
  if (combo > COMBO_BONUS_THRESHOLD) awardBonusMoves();
  updateHUD();

  renderBoard();
  for (const [r,c] of matches) {
    const el = getTileEl(r,c);
    if (el) el.classList.add('matched');
  }
  await sleep(260);

  const specialCells = [];
  for (const [r,c] of matches) {
    const t = board[r][c];
    if (t && t.special !== SPECIAL.NONE && t.special !== SPECIAL.DISCO) {
      specialCells.push([r,c,t.special,t.color]);
    }
    if (t && t.special === SPECIAL.DISCO) {
      specialCells.push([r,c,SPECIAL.DISCO,t.color]);
    }
  }

  for (const [r,c] of matches) board[r][c] = null;

  for (const sp of toSpawn) {
    board[sp.r][sp.c] = createTile(sp.color, sp.special);
  }

  renderBoard();

  for (const [sr,sc,stype,scolor] of specialCells) {
    if (board[sr][sc]?.special && board[sr][sc].special !== SPECIAL.NONE) continue;
    await triggerSpecial(sr, sc, stype, scolor);
  }

  await dropTiles();
  await sleep(80);

  const newMatches = findMatches();
  if (newMatches.length > 0) {
    showCombo();
    await processMatches(newMatches);
  } else {
    combo = 1; updateHUD();
  }
}

async function triggerSpecial(r, c, special, triggerColor) {
  const color = triggerColor || board[r]?.[c]?.color;

  if (special === SPECIAL.BOMB) {
    spawnExplosion(r, c);
    const cells = [];
    for (let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
      const nr=r+dr, nc=c+dc;
      if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) cells.push([nr,nc]);
    }
    addScore(cells.length*80, cells);
    for(const [nr,nc] of cells) {
      if (board[nr][nc]?.special && board[nr][nc].special !== SPECIAL.NONE) {
        const chainType = board[nr][nc].special;
        const chainColor = board[nr][nc].color;
        board[nr][nc] = null;
        renderBoard();
        await sleep(60);
        await triggerSpecial(nr, nc, chainType, chainColor);
      } else {
        board[nr][nc] = null;
      }
    }
  } else if (special === SPECIAL.FIREWORK_H) {
    spawnFireworkLine(r, c, 'h');
    const cells = [];
    for (let nc=0;nc<COLS;nc++) cells.push([r,nc]);
    addScore(cells.length*80, cells);
    for(const [nr,nc] of cells) {
      if (board[nr][nc]?.special && board[nr][nc].special !== SPECIAL.NONE && !(nr===r&&nc===c)) {
        const chainType = board[nr][nc].special;
        const chainColor = board[nr][nc].color;
        board[nr][nc] = null;
        renderBoard();
        await sleep(40);
        await triggerSpecial(nr, nc, chainType, chainColor);
      } else {
        board[nr][nc] = null;
      }
    }
  } else if (special === SPECIAL.FIREWORK_V) {
    spawnFireworkLine(r, c, 'v');
    const cells = [];
    for (let nr=0;nr<ROWS;nr++) cells.push([nr,c]);
    addScore(cells.length*80, cells);
    for(const [nr,nc] of cells) {
      if (board[nr][nc]?.special && board[nr][nc].special !== SPECIAL.NONE && !(nr===r&&nc===c)) {
        const chainType = board[nr][nc].special;
        const chainColor = board[nr][nc].color;
        board[nr][nc] = null;
        renderBoard();
        await sleep(40);
        await triggerSpecial(nr, nc, chainType, chainColor);
      } else {
        board[nr][nc] = null;
      }
    }
  } else if (special === SPECIAL.DISCO) {
    spawnExplosion(r, c);
    const targetColor = color || randColor();
    const cells = [];
    for(let nr=0;nr<ROWS;nr++) for(let nc=0;nc<COLS;nc++) {
      if (board[nr][nc]?.color===targetColor) { cells.push([nr,nc]); }
    }
    addScore(cells.length*90, cells);
    for(const [nr,nc] of cells) board[nr][nc] = null;
  }

  renderBoard();
  await sleep(200);
}

async function handleDiscoSwap(r1,c1,r2,c2,origT1,origT2) {
  const discoPos = origT1?.special===SPECIAL.DISCO ? [r2,c2] : [r1,c1];
  const otherPos = origT1?.special===SPECIAL.DISCO ? [r1,c1] : [r2,c2];
  const otherTile = board[otherPos[0]][otherPos[1]];

  if (otherTile?.special === SPECIAL.DISCO) {
    spawnExplosion(r1,c1); spawnExplosion(r2,c2);
    addScore(ROWS*COLS*100, null);
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) board[r][c]=null;
  } else if (otherTile?.special === SPECIAL.BOMB || otherTile?.special === SPECIAL.FIREWORK_H || otherTile?.special === SPECIAL.FIREWORK_V) {
    const targetColor = COLORS[Math.floor(Math.random()*COLORS.length)];
    board[discoPos[0]][discoPos[1]] = null;
    const sType = otherTile.special;
    const triggers = [];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
      if (board[r][c]?.color===targetColor) { board[r][c].special=sType; triggers.push([r,c]); }
    }
    renderBoard(); await sleep(200);
    for(const [tr,tc] of triggers) {
      const tt = board[tr][tc];
      if (tt) await triggerSpecial(tr,tc,sType,tt.color);
    }
  } else {
    const targetColor = otherTile?.color || randColor();
    board[discoPos[0]][discoPos[1]] = null;
    board[otherPos[0]][otherPos[1]] = null;
    const cells = [];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
      if (board[r][c]?.color===targetColor) { cells.push([r,c]); board[r][c]=null; }
    }
    spawnExplosion(r1,c1);
    addScore((cells.length+2)*90, cells);
  }

  renderBoard(); await sleep(300);
  await dropTiles();
  const nm = findMatches();
  if (nm.length>0) { showCombo(); await processMatches(nm); }
  else { combo=1; updateHUD(); }
}

async function dropTiles() {
  const falling = [];
  for (let c=0;c<COLS;c++) {
    let writeRow = ROWS-1;
    for (let r=ROWS-1;r>=0;r--) {
      if (board[r][c]) {
        if (r!==writeRow) {
          board[writeRow][c]=board[r][c];
          board[r][c]=null;
          falling.push([writeRow,c]);
        }
        writeRow--;
      }
    }
    while (writeRow>=0) {
      board[writeRow][c]=createTile(randColor());
      falling.push([writeRow,c]);
      writeRow--;
    }
  }
  renderBoard(falling);
  await sleep(350);
}

function addScore(pts, cells) {
  score += pts;
  if (score>best) { best=score; localStorage.setItem('royal_best',best); }
  updateHUD();
  if (cells && cells.length>0) {
    const avgR = cells.reduce((s,[r])=>s+r,0)/cells.length;
    const avgC = cells.reduce((s,[,c])=>s+c,0)/cells.length;
    const bRect = boardEl.getBoundingClientRect();
    const pop = document.createElement('div');
    pop.className = 'score-pop';
    pop.textContent = '+'+pts;
    pop.style.left = (bRect.left + 10 + avgC*66 + 20)+'px';
    pop.style.top  = (bRect.top  + 10 + avgR*66 + 10)+'px';
    pop.style.position = 'fixed';
    document.body.appendChild(pop);
    pop.addEventListener('animationend',()=>pop.remove());
  }
}

function updateHUD() {
  document.getElementById('score-val').textContent = score.toLocaleString();
  document.getElementById('best-val').textContent = best.toLocaleString();
  document.getElementById('combo-val').textContent = `x${combo}`;
  document.getElementById('moves-val').textContent = movesLeft;
  const movesBox = document.getElementById('moves-box');
  if (movesLeft <= 8) movesBox.classList.add('low');
  else movesBox.classList.remove('low');
}

function showCombo() {
  const el = document.getElementById('combo-flash');
  el.textContent = combo>3 ? `COMBO x${combo}!` : `x${combo}`;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

const COMBO_BONUS_THRESHOLD = 4;
const COMBO_BONUS_MOVES = 2;

function awardBonusMoves() {
  movesLeft += COMBO_BONUS_MOVES;
  updateHUD();

  const box = document.getElementById('moves-box');
  box.classList.remove('bonus');
  void box.offsetWidth;
  box.classList.add('bonus');

  const boxRect = box.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'bonus-moves-pop';
  pop.textContent = `+${COMBO_BONUS_MOVES} Moves!`;
  pop.style.left = (boxRect.left + boxRect.width / 2) + 'px';
  pop.style.top  = (boxRect.top - 10) + 'px';
  pop.style.transform = 'translateX(-50%)';
  document.body.appendChild(pop);
  pop.addEventListener('animationend', () => pop.remove());
}

function spawnExplosion(r,c) {
  const bRect = boardEl.getBoundingClientRect();
  const x = bRect.left + 10 + c*66 + 33;
  const y = bRect.top  + 10 + r*66 + 33;
  const ring = document.createElement('div');
  ring.className = 'explosion';
  ring.style.left = x+'px';
  ring.style.top  = y+'px';
  ring.style.position = 'fixed';
  document.body.appendChild(ring);
  ring.addEventListener('animationend',()=>ring.remove());
}

function spawnFireworkLine(r, c, dir) {
  const bRect = boardEl.getBoundingClientRect();
  const line = document.createElement('div');
  if (dir === 'h') {
    const y = bRect.top + 10 + r*66 + 30;
    line.className = 'firework-line';
    line.style.left = (bRect.left + 10) + 'px';
    line.style.top = y + 'px';
    line.style.width = (COLS * 66) + 'px';
  } else {
    const x = bRect.left + 10 + c*66 + 30;
    line.className = 'firework-line vertical';
    line.style.left = x + 'px';
    line.style.top = (bRect.top + 10) + 'px';
    line.style.height = (ROWS * 66) + 'px';
  }
  line.style.position = 'fixed';
  document.body.appendChild(line);
  line.addEventListener('animationend',()=>line.remove());
  spawnExplosion(r, c);
}

function resetHintTimer() {
  if (hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(showHint, 3000);
}

function showHint() {
  clearSelected();
  for (let r=0;r<ROWS;r++) {
    for (let c=0;c<COLS;c++) {
      const neighbors = [[r,c+1],[r+1,c]];
      for (const [nr,nc] of neighbors) {
        if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
        doSwap(r,c,nr,nc);
        const m = findMatches();
        doSwap(r,c,nr,nc);
        if (m.length>0) {
          const el1 = getTileEl(r,c), el2 = getTileEl(nr,nc);
          if (el1) el1.classList.add('hint');
          if (el2) el2.classList.add('hint');
          hintTimer = setTimeout(()=>{
            if(el1)el1.classList.remove('hint');
            if(el2)el2.classList.remove('hint');
          }, 2000);
          return;
        }
      }
    }
  }
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

function triggerGameOver() {
  gameOver = true;
  busy = true;
  if (hintTimer) clearTimeout(hintTimer);
  clearSelected();

  const isNewBest = score > 0 && score >= best;
  document.getElementById('go-score').textContent = score.toLocaleString();
  document.getElementById('go-best').textContent = best.toLocaleString();
  const newBestEl = document.getElementById('go-new-best');
  if (isNewBest && score > 0) newBestEl.classList.remove('hidden');
  else newBestEl.classList.add('hidden');

  setTimeout(() => {
    document.getElementById('gameover-overlay').classList.add('show');
  }, 400);
}

function startNewGame() {
  document.getElementById('gameover-overlay').classList.remove('show');
  score = 0;
  combo = 1;
  movesLeft = MAX_MOVES;
  gameOver = false;
  busy = false;
  selected = null;
  initBoard();
  renderBoard();
  updateHUD();
  resetHintTimer();
}
movesLeft = MAX_MOVES;
best = parseInt(localStorage.getItem('royal_best')||'0');
updateHUD();
initBoard();
renderBoard();
resetHintTimer();
</script>
